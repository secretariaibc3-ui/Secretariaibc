<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0, viewport-fit=cover" />
    <title>Secretaria IBC</title>
    <script>
      (function() {
        try {
          var localTheme = localStorage.getItem('theme');
          var sysTheme = window.matchMedia('(prefers-color-scheme: dark)').matches;
          if (localTheme === 'dark' || (!localTheme && sysTheme)) {
            document.documentElement.classList.add('dark');
          } else {
            document.documentElement.classList.remove('dark');
          }
        } catch (e) {}
      })();
    </script>
    <script>
      window.onerror = function(message, source, lineno, colno, error) {
        if (message === 'Script error.') return true;
        const errorMsg = document.createElement('div');
        errorMsg.style.cssText = 'position:fixed;top:0;left:0;right:0;bottom:0;background:white;color:red;padding:20px;z-index:99999;overflow:auto;font-family:monospace;';
        errorMsg.innerHTML = '<h1>Runtime Error</h1><p>' + message + '</p><p>at ' + source + ':' + lineno + ':' + colno + '</p><pre>' + (error ? error.stack : '') + '</pre>';
        document.body.appendChild(errorMsg);
        return false;
      };
    </script>
    <link id="pwa-manifest" rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#0D9488" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Secretaria IBC" />
    <meta name="application-name" content="Secretaria IBC" />
    <meta name="msapplication-TileColor" content="#0D9488" />
    <meta name="msapplication-tap-highlight" content="no" />
    
    <!-- Icons -->
    <link id="apple-icon" rel="apple-touch-icon" sizes="192x192" href="/icon-192.png" />
    <link id="favicon-48" rel="icon" type="image/png" sizes="48x48" href="/icon-48.png" />
    <link id="favicon-64" rel="icon" type="image/png" sizes="64x64" href="/icon-64.png" />
    <link id="favicon-96" rel="icon" type="image/png" sizes="96x96" href="/icon-96.png" />
    <link id="favicon-144" rel="icon" type="image/png" sizes="144x144" href="/icon-144.png" />
    <link id="favicon-192" rel="icon" type="image/png" sizes="192x192" href="/icon-192.png" />
    <link id="favicon" rel="icon" type="image/png" href="/icon-192.png" />
    <meta id="ms-tile-image" name="msapplication-TileImage" content="/icon-144.png" />

</html>
