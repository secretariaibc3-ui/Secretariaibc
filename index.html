<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0, viewport-fit=cover" />
    <title>Secretaria IBC</title>
    <script>
      window.onerror = function(message, source, lineno, colno, error) {
        const errorMsg = document.createElement('div');
        errorMsg.style.cssText = 'position:fixed;top:0;left:0;right:0;bottom:0;background:white;color:red;padding:20px;z-index:99999;overflow:auto;font-family:monospace;';
        errorMsg.innerHTML = '<h1>Runtime Error</h1><p>' + message + '</p><p>at ' + source + ':' + lineno + ':' + colno + '</p><pre>' + (error ? error.stack : '') + '</pre>';
        document.body.appendChild(errorMsg);
        return false;
      };
    </script>
    <link id="pwa-manifest" rel="manifest" href="/api/manifest" />
    <meta name="theme-color" content="#0D9488" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Secretaria IBC" />
    <meta name="application-name" content="Secretaria IBC" />
    <meta name="msapplication-TileColor" content="#0D9488" />
    <meta name="msapplication-tap-highlight" content="no" />
    
    <!-- Icons -->
    <link id="apple-icon" rel="apple-touch-icon" href="/logo-secretariaibc.png" />
    <link id="favicon" rel="icon" type="image/png" href="/logo-secretariaibc.png" />
    <meta id="ms-tile-image" name="msapplication-TileImage" content="/logo-secretariaibc.png" />
    
    <!-- Splash Screens (Primary Sizes) -->
    <link rel="apple-touch-startup-image" href="/logo-secretariaibc.png" />

  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
